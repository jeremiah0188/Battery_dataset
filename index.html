<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Battery Dataset Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lora:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  <style>
    /* 引入 Harrington 字体用于 Logo */
    @font-face {
      font-family: 'Harrington';
      src: local('Harrington');
      /* 如果用户电脑没有该字体，退化为 Georgia 衬线体 */
    }

    :root {
      /* 全局浅色渐变背景 */
      --bg-color: linear-gradient(135deg, #FAFCFA 0%, #F0F4F1 50%, #E8F0EA 100%); 
      --text: #475569;
      --title: #143524; 
      --muted: #94A3B8;
      --card: #FFFFFF;
      --line: #E2E8F0;
      --brand: #6EC41A; /* 导航栏要求的新绿色 */
      --brand-dark: #58A015;
      --btn: #3A9D5D; /* 按钮保持稍深的绿以保证对比度 */
      --btn-hover: #2B7A46;
      --shadow: 0 20px 50px rgba(20, 53, 36, 0.06); 
      --shadow-hover: 0 25px 60px rgba(20, 53, 36, 0.1);
      --white: #fff;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); }
    body {
      background: var(--bg-color);
      background-attachment: fixed;
      min-height: 100vh;
    }
    
    /* 增加两侧留白：缩小 max-width 到 1280px */
    .app {
      max-width: min(90%, 1280px);
      width: 100%;
      margin: 0 auto;
      padding: 0 1rem 2rem;
    }

    /* === 顶部导航栏吸顶 & 样式 === */
    .nav-shell {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(250, 252, 250, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(226, 232, 240, 0.8); /* 浅色横线 */
      margin-bottom: 2rem;
      padding: 12px 0;
    }
    
    .nav-bar {
      max-width: min(90%, 1280px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      align-items: center;
      gap: 24px;
      padding: 0 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .logo img { height: 36px; width: auto; display: block; filter: brightness(0.9); }
    
    /* Logo 旁的文字：Harrington字体，加粗，字号放大一倍 */
    .logo-text {
      font-family: 'Harrington', 'Georgia', serif;
      font-size: 30px; 
      font-weight: 900;
      color: var(--title);
      letter-spacing: -0.5px;
    }
    
    .nav-menu-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; align-items: center; }
    
    /* 导航栏字体颜色改为 #6EC41A */
    .nav-pill {
      min-width: fit-content;
      height: 42px;
      border: none;
      background: transparent;
      color: #64748B;
      font-weight: 700;
      font-size: 15px;
      padding: 0 16px;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }
    .nav-pill:hover { color: var(--title); transform: translateY(-1px); }
    .nav-pill.active { font-weight: 700; position: relative; color: #64748B; }
    .nav-pill.active::after {
      content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 3px; background: #64748B; border-radius: 4px;
    }

    .nav-search input, input[type="text"], input[type="email"], input[type="password"], input[type="url"], select, textarea {
      width: 100%; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; padding: 12px 16px; font-size: 14px; outline: none; transition: all 0.3s ease; font-family: inherit;
    }
    .nav-search input { border-radius: 999px; padding: 10px 20px; font-size: 14px; background: rgba(255,255,255,0.7); }
    input:focus, select:focus, textarea:focus { background: #fff; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(110, 196, 26, 0.15); }

    /* 图标优化：去圆框，放大 */
    .icon-group { display: flex; gap: 16px; align-items: center; }
    .icon-btn {
      border: none; background: transparent; box-shadow: none; cursor: pointer;
      font-size: 22px; color: #64748B; position: relative; padding: 4px; transition: transform 0.2s;
    }
    .icon-btn:hover { transform: scale(1.1); }
    .notif-dot::after {
      content: ""; position: absolute; top: 2px; right: 2px; width: 10px; height: 10px;
      background: #EF4444; border: 2px solid #FFF; border-radius: 999px;
    }

    /* Auth 按钮区：Log in 文本 + Get Started Free 绿按钮 */
    .auth-wrap-nav { display: flex; align-items: center; gap: 16px; }
    .sign-in-text {
      background: transparent; border: none; font-size: 15px; font-weight: 700; color: #64748B;
      cursor: pointer; padding: 0 8px; transition: color 0.3s; font-family: inherit;
    }
    .sign-in-text:hover { color: var(--title); }

    .btn, button.primary, .tab-btn, .small-btn {
      background: var(--btn); border: none; color: #fff; font-weight: 700; border-radius: 999px;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1); min-height: 44px; padding: 0 28px;
      box-shadow: 0 4px 12px rgba(58, 157, 93, 0.25); cursor: pointer; font-family: inherit; font-size: 15px; display: inline-flex; align-items: center; justify-content: center;
    }
    .btn:hover, button.primary:hover, .small-btn:hover { background: var(--btn-hover); box-shadow: 0 6px 16px rgba(43, 122, 70, 0.35); transform: translateY(-2px); }
    .btn-outline { background: transparent !important; border: 2px solid var(--btn) !important; color: var(--btn) !important; box-shadow: none !important; }
    .btn-outline:hover { background: rgba(58, 157, 93, 0.08) !important; }

    .card {
      background: var(--card); border: 1px solid rgba(226, 232, 240, 0.6); border-radius: 20px;
      box-shadow: var(--shadow); padding: 32px; margin-bottom: 24px; transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover { box-shadow: var(--shadow-hover); }
    
    .section-header { padding: 16px 0; margin-bottom: 12px; background: transparent; border: none; border-radius: 0; }
    .section-header h2 { font-size: 24px; font-weight: 800; color: var(--title); margin: 0; }

    /* === 粒子动画 Hero 区域 === */
    .hero-container {
      position: relative;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      padding: clamp(2rem, 5vw, 5rem) 2rem;
      background: #FFFFFF;
      border-radius: 24px;
      border: 1px solid rgba(226, 232, 240, 0.8);
      box-shadow: var(--shadow);
      margin-bottom: 2.5rem;
      gap: 40px;
      overflow: hidden; /* 保证粒子在内部 */
    }
    #particleCanvas {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    .hero-content-wrapper { position: relative; z-index: 1; } 
    
    .hero-subtitle { 
      display: inline-flex; align-items: center; font-size: 13px; font-weight: 700; 
      color: var(--brand-dark); background: rgba(110, 196, 26, 0.15); 
      padding: 6px 14px; border-radius: 999px; margin-bottom: 1.5rem; width: fit-content;
    }
    .hero-subtitle::before { content: '✔'; margin-right: 6px; font-size: 11px; }

    .hero-title { font-family: 'Lora', Georgia, serif; font-size: clamp(3rem, 5vw, 4.5rem); font-weight: 700; line-height: 1.1; color: var(--title); margin-bottom: 1.4rem; letter-spacing: -1px; }
    .hero-title span { color: var(--btn); }
    .hero-desc { font-size: clamp(1.05rem, 1.2vw, 1.2rem); color: #64748B; line-height: 1.6; margin-bottom: 2.5rem; max-width: 600px; }
    
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 2rem; }
    .hero-note { display: flex; gap: 20px; flex-wrap: wrap; color: #64748B; font-size: 14px; font-weight: 600; }
    .hero-note span { display: flex; align-items: center; gap: 6px; }
    .hero-note span::before { content: '✔'; color: var(--btn); font-size: 12px; }
    
    .hero-right { min-width: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; position: relative; z-index: 1; }
    .bento-card {
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px);
      border-radius: 20px; padding: 24px; display: flex; flex-direction: column; justify-content: space-between;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid #E2E8F0;
      transition: transform 0.4s;
    }
    .bento-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    .span-2 { grid-row: span 2; min-height: 340px; }

    .chem-tag {
      background: rgba(110, 196, 26, 0.1); padding: 8px 16px; border-radius: 30px; font-size: 13px; font-weight: 700;
      color: var(--brand-dark); border: 1px solid rgba(110, 196, 26, 0.2); display: inline-block; margin: 4px;
    }

    /* === 纯英文文件上传按钮样式 === */
    .custom-file-upload-wrapper { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    .custom-file-label {
      background: #F8FAFC; border: 1px solid #E2E8F0; padding: 12px 20px; border-radius: 12px;
      color: var(--title); font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .custom-file-label:hover { border-color: var(--brand); background: rgba(110, 196, 26, 0.05); color: var(--brand-dark); }
    .file-name-display { color: #64748B; font-size: 14px; font-style: italic; }

    .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .four-col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    .dataset-card-mini { padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 16px; border-left: 4px solid var(--btn); }
    .caption { color: #94A3B8; font-size: 13px; font-weight: 500; margin-top: 8px; }
    
    .info, .warn, .success, .error { border-radius: 12px; padding: 14px 18px; font-size: 14px; margin-top: 12px; font-weight: 500; }
    .info { background: #F8FAFC; color: #475569; border: 1px solid #E2E8F0; }
    .warn { background: #FFFBEB; color: #B45309; border: 1px solid #FDE68A; }
    .success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
    .error { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }

    details { background: var(--white); border: 1px solid #E2E8F0; border-radius: 16px; padding: 18px 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    summary { cursor: pointer; font-weight: 700; color: var(--title); font-size: 16px; outline: none; }
    details p { color: #64748B; line-height: 1.7; margin: 12px 0 0; }

    .filter-wrap { display: grid; gap: 20px; }
    .expander { border: 1px solid #E2E8F0; border-radius: 20px; background: var(--white); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
    .expander-head { padding: 20px 24px; cursor: pointer; font-weight: 800; color: var(--title); background: #F8FAFC; font-size: 15px; border-bottom: 1px solid #E2E8F0; }
    .expander-body { padding: 24px; display: block; }
    .result-bar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; background: transparent; padding: 12px 0; border: none; margin-bottom: 16px; margin-top: 24px; border-bottom: 2px solid #E2E8F0; border-radius: 0; }
    .badge-green { background: var(--btn); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 13px; margin-right: 8px; font-weight: 800; }

    .dataset-table { border: 1px solid #E2E8F0; border-radius: 20px; overflow: hidden; background: #fff; margin-bottom: 32px; box-shadow: var(--shadow); }
    .dataset-list-header, .dataset-list-row { display: grid; grid-template-columns: 2.5fr 1.5fr 1fr 0.8fr; align-items: center; gap: 16px; }
    .dataset-list-header { background-color: #F8FAFC; padding: 16px 24px; font-size: 13px; font-weight: 700; color: #64748B; border-bottom: 1px solid #E2E8F0; text-transform: uppercase; letter-spacing: 0.5px; }
    .dataset-list-row { padding: 20px 24px; font-size: 14px; border-bottom: 1px solid #F8FAFC; transition: all 0.2s ease; }
    .dataset-list-row:hover { background-color: #F8FAFC; }
    .ds-name { font-weight: 700; color: var(--title); font-size: 15px; }
    .tag-soft { background: #F1F5F9; border: 1px solid #E2E8F0; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; display: inline-block; color: #475569; }
    .metadata-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; margin-top: 24px; }
    .metadata-item { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 16px; padding: 18px; }
    .metadata-label { font-size: 12px; font-weight: 700; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .metadata-value { font-size: 15px; font-weight: 600; color: var(--title); word-wrap: break-word; }

    .tabs { display: flex; gap: 24px; border-bottom: 2px solid #E2E8F0; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; }
    .tab-btn { min-height: auto; border-radius: 0; padding: 8px 4px; background: transparent; color: #64748B; box-shadow: none; font-weight: 600; font-size: 15px; }
    .tab-btn:hover { background: transparent; box-shadow: none; color: var(--btn); transform: none; }
    .tab-btn.active { color: var(--brand-dark); border-bottom: 3px solid var(--btn); font-weight: 800; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .form-row { display: grid; gap: 20px; margin-bottom: 20px; }
    .form-row.two { grid-template-columns: 1fr 1fr; }
    .form-row.three { grid-template-columns: repeat(3, 1fr); }
    .field label { display: block; font-size: 14px; font-weight: 600; color: #475569; margin-bottom: 8px; }
    textarea { min-height: 120px; resize: vertical; }
    .hr { height: 1px; background: #E2E8F0; margin: 24px 0; border: none; }

    .auth-wrap { max-width: 500px; margin: 60px auto 0; }
    .title-xl { font-family: 'Lora', serif; font-size: 36px; font-weight: 700; color: var(--title); margin-bottom: 12px; text-align: center; }
    .sub-center { color: #64748B; font-size: 15px; margin-bottom: 32px; line-height: 1.6; text-align: center; }

    .notif-toolbar { display: grid; grid-template-columns: 3fr 2fr 5fr; gap: 16px; align-items: start; }
    .notif-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .notif-item {
      border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 20px;
      transition: transform 0.2s; background: var(--white); box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid #E2E8F0;
    }
    .notif-icon { font-size: 26px; padding-top: 2px; }
    .notif-title { font-weight: 800; color: var(--title); font-size: 16px; }
    .notif-time { font-size: 13px; color: #94A3B8; font-weight: 600; }
    .notif-msg { color: #475569; font-size: 15px; margin: 8px 0 14px; line-height: 1.6; }
    .tag-blue { background: #ECFDF5; color: #047857; border: 1px solid #D1FAE5; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid #E2E8F0; font-size: 14px; }
    th { color: #64748B; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }

    .footer { text-align: center; padding: 40px; color: #94A3B8; font-size: 14px; margin-top: 60px; border-top: 1px solid #E2E8F0; }
    .footer a { color: #64748B; text-decoration: none; font-weight: 500; }
    .footer a:hover { color: var(--btn); }

    .hidden { display: none !important; }

    @media (max-width: 1200px) {
      .nav-bar { grid-template-columns: 1fr; justify-content: center; justify-items: center; text-align: center; }
      .nav-menu-row { flex-wrap: wrap; justify-content: center; }
      .grid-2-1, .four-col, .three-col, .two-col, .form-row.two, .form-row.three, .notif-toolbar, .hero-container { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .hero-container { flex-direction: column; text-align: center; padding: 2rem 0; }
      .hero-content-wrapper.hero-left { align-items: center; }
      .hero-desc { text-align: center; }
      .hero-actions { justify-content: center; }
      .hero-note { justify-content: center; }
      .hero-right { grid-template-columns: 1fr; }
      .span-2 { grid-row: span 1; min-height: 250px; }
      .dataset-list-header, .dataset-list-row { grid-template-columns: 1fr; gap: 8px; }
      .nav-pill { font-size: 15px; padding: 0 10px; height: 36px; }
    }
    @media (max-width: 480px) {
      .app { padding-left: 16px; padding-right: 16px; }
      .hero-title { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  
  <div class="nav-shell">
    <div class="nav-bar">
      <div class="logo" onclick="goto('Homepage')">
        <img src="https://raw.githubusercontent.com/jeremiah0188/Battery_dataset/main/logo.png" alt="logo" />
        <span class="logo-text">BatteryAtlas</span>
      </div>

      <div id="navMenu" class="nav-menu-row"></div>

      <div class="nav-search" id="navSearchWrap">
        <input id="globalNavSearch" type="text" placeholder="Search datasets..." />
      </div>

      <div class="icon-group" id="navIconsWrap">
        <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
        <button class="icon-btn notif-dot" id="notificationsBtn" title="Notifications">🔔</button>
      </div>

      <div id="authWrap" class="auth-wrap-nav"></div>
    </div>
  </div>

  <main class="app" id="app">
    <div id="pageRoot"></div>

    <div class="footer">
      © 2026 Open Battery Dataset Portal. Maintained by Jian.<br><br>
      <a href="#">Privacy</a> &nbsp;|&nbsp; <a href="#">Terms</a> &nbsp;|&nbsp; <a href="#">Status</a>
    </div>
  </main>

  <script>
    const initialNotifications = [
      { id: 1, title: "Your dataset submission has been approved", msg: "Your dataset 'NMC Aging Profiling' is now live and accessible.", time: "2 hours ago", status: "Unread", type: "Dataset", icon: "✅" },
      { id: 2, title: "Your submission is under review", msg: "Admin is currently reviewing 'LFP Cycling Data'.", time: "1 day ago", status: "Read", type: "Review", icon: "⏳" },
      { id: 3, title: "New dataset added in Battery / EIS", msg: "Check out the newly added 'Oxford Battery Degradation' dataset.", time: "2 days ago", status: "Read", type: "System", icon: "🆕" }
    ];

    const initialDatasets = [
      {
        "Dataset Name": "Oxford Battery Degradation", "Author": "Birkl, Ceder et al.", "Domain": "Energy", "Category": "Battery", "Sub-category": "EIS", "Status": "Approved", "Battery Chemistry": "NMC", "Chemistry": "NMC", "Battery Level": "Cell", "Data Type": "Time-Series", "Task Type": "Regression", "Application Scenario": "SOH Estimation", "Labels Available": "Yes", "Data Quality": "Processed", "Year": "2024", "Short Description": "High-fidelity battery degradation data with EIS snapshots.", "Source Organization": "University of Oxford", "Link / DOI": "https://ora.ox.ac.uk/", "Link": "https://ora.ox.ac.uk/"
      },
      {
        "Dataset Name": "NMC Aging Profiling", "Author": "J. Smith, A. Lee", "Domain": "Energy", "Category": "Battery", "Sub-category": "Time-Series", "Status": "Approved", "Battery Chemistry": "NMC", "Chemistry": "NMC", "Battery Level": "Cell", "Data Type": "Capacity", "Task Type": "Regression", "Application Scenario": "RUL Prediction", "Labels Available": "Yes", "Data Quality": "Processed", "Year": "2025", "Short Description": "Cycling and aging trajectories for NMC cells.", "Source Organization": "Open Battery Lab", "Link / DOI": "https://example.com/nmc", "Link": "https://example.com/nmc"
      },
      {
        "Dataset Name": "LFP Cycling Data", "Author": "Unspecified", "Domain": "Transportation", "Category": "Battery", "Sub-category": "Voltage", "Status": "Pending", "Battery Chemistry": "LFP", "Chemistry": "LFP", "Battery Level": "Pack", "Data Type": "Current", "Task Type": "Classification", "Application Scenario": "SOC Estimation", "Labels Available": "Partial", "Data Quality": "Mixed", "Year": "2023", "Short Description": "Pack-level charging and discharging records.", "Source Organization": "Community Submission", "Link / DOI": "", "Link": ""
      }
    ];

    const state = {
      isAdmin: false, currentView: "Homepage", lastMenuSelection: "Homepage", searchKw: "", navClick: "", pendingSearch: "",
      userPrefs: { default_page: "Homepage", theme: "Light", items: 20, lang: "English" },
      dataPrefs: { domain: "All", chem: "All", sort: "Most Recent" },
      notifPrefs: { email: true, status: true, alerts: false, digest: true },
      notifications: structuredClone(initialNotifications),
      datasets: [],
      selectedDataset: "(Select to view)",
      browseFilters: { domain: "All", category: "All", year: "All", chem: "All", level: "All", datatype: "All", task: "All", app: "All", labels: "All", quality: "All", status: "All" },
      login: { email: "", password: "" }, signup: { name: "", email: "", password: "" }, filterNotif: "All"
    };

    // 🚨 把这里换成你刚才复制的真实 Web App URL

    // === 粒子动画逻辑 ===
    function initParticleAnimation() {
      const canvas = document.getElementById('particleCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let width = canvas.width = canvas.offsetWidth;
      let height = canvas.height = canvas.offsetHeight;

      const particles = [];
      const particleCount = 40; 

      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * width, y: Math.random() * height,
          vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
          radius: Math.random() * 2 + 1.5
        });
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < particleCount; i++) {
          let p = particles[i];
          p.x += p.vx; p.y += p.vy;

          if (p.x < 0 || p.x > width) p.vx *= -1;
          if (p.y < 0 || p.y > height) p.vy *= -1;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(110, 196, 26, 0.4)';
          ctx.fill();

          for (let j = i + 1; j < particleCount; j++) {
            let p2 = particles[j];
            let dist = Math.sqrt((p.x - p2.x)**2 + (p.y - p2.y)**2);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = `rgba(110, 196, 26, ${1 - dist/120})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }
        animationFrameId = requestAnimationFrame(draw);
      }
      draw();

      window.addEventListener('resize', () => {
        if (canvas) { width = canvas.width = canvas.offsetWidth; height = canvas.height = canvas.offsetHeight; }
      });
    }

    function filterDatasets() {
      let filtered = [...getPublicDf()];
      const f = state.browseFilters;
      const searchKw = state.searchKw.trim().toLowerCase();

      if (searchKw) {
        filtered = filtered.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(searchKw)));
      }
      if (f.domain !== 'All') filtered = filtered.filter(r => String(r['Domain'] || '').toLowerCase().includes(f.domain.toLowerCase()));
      if (f.category !== 'All') filtered = filtered.filter(r => String(r['Category'] || '').toLowerCase().includes(f.category.toLowerCase()));
      if (f.year !== 'All') filtered = filtered.filter(r => String(r['Year'] || '').toLowerCase().includes(f.year.toLowerCase()));
      if (f.chem !== 'All') filtered = filtered.filter(r => String(r['Chemistry'] || '').toLowerCase().includes(f.chem.toLowerCase()));
      if (f.level !== 'All') filtered = filtered.filter(r => String(r['Battery Level'] || '').toLowerCase().includes(f.level.toLowerCase()));
      if (f.datatype !== 'All') {
        filtered = filtered.filter(r => String(r['Data Type'] || '').toLowerCase().includes(f.datatype.toLowerCase()) || String(r['Sub-category'] || '').toLowerCase().includes(f.datatype.toLowerCase()));
      }
      if (f.task !== 'All') filtered = filtered.filter(r => String(r['Task Type'] || '').toLowerCase().includes(f.task.toLowerCase()));
      if (f.app !== 'All') filtered = filtered.filter(r => String(r['Application Scenario'] || '').toLowerCase().includes(f.app.toLowerCase()));
      if (f.labels !== 'All') filtered = filtered.filter(r => String(r['Labels Available'] || '').toLowerCase().includes(f.labels.toLowerCase()));
      if (f.quality !== 'All') filtered = filtered.filter(r => String(r['Data Quality'] || '').toLowerCase().includes(f.quality.toLowerCase()));
      if (f.status !== 'All') filtered = filtered.filter(r => String(r['Status'] || '').toLowerCase().includes(f.status.toLowerCase()));
      return filtered;
    }

      document.getElementById('browseSearch').addEventListener('input', e => { state.searchKw = e.target.value; renderBrowse(); });
      [['f_domain','domain'],['f_category','category'],['f_year','year'],['f_chem','chem'],['f_level','level'],['f_datatype','datatype'],['f_task','task'],['f_app','app'],['f_labels','labels'],['f_quality','quality'],['f_status','status']].forEach(([id,key]) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('change', e => { state.browseFilters[key] = e.target.value; renderBrowse(); });
      });
      const select = document.getElementById('datasetSelect');
      if (select) select.addEventListener('change', e => { state.selectedDataset = e.target.value; document.getElementById('datasetDetailsWrap').innerHTML = datasetDetailsHtml(filtered.find(d => d['Dataset Name'] === state.selectedDataset)); });
      document.querySelectorAll('[data-view-ds]').forEach(btn => {
        btn.addEventListener('click', e => {
          const idx = Number(e.currentTarget.getAttribute('data-view-ds'));
          state.selectedDataset = filtered[idx]['Dataset Name'];
          renderBrowse();
          document.getElementById('datasetDetailsWrap')?.scrollIntoView({behavior:'smooth', block:'start'});
        });
      });
    }

    function renderContribute() {

          <div class="card">
            <p>Help expand this curated dataset hub. Please provide standardized metadata to improve discoverability.</p>
            <form id="uploadForm">
              <div class="form-row two">
                <div class="field"><label>Dataset Name *</label><input name="new_name" type="text"></div>
                <div class="field"><label>Short Description *</label><input name="new_desc" type="text"></div>

                  </label>

                  <span id="fileNameDisplay" class="file-name-display">No file chosen</span>

              </div>

              <div class="form-row two" style="margin-top:20px;">
                <div class="field"><label>Contributor Name *</label><input name="new_contributor" type="text"></div>
                <div class="field"><label>Contact Email (Optional)</label><input name="new_email" type="email"></div>
              </div>
              <button class="primary" type="submit">Submit to Moderation</button>
              <div id="submitMsg"></div>
            </form>
          </div>
        </div>

        <div class="tab-panel" data-panel="request">
          <div class="card">
            <h3 style="margin-top:0;">Can't find what you're looking for?</h3>
            <p>Submit a request. If our community or admins find relevant open-source data, we'll add it to the platform.</p>
            <form id="requestForm">
              <div class="form-row">
                <div class="field"><label>Requested Topic / Dataset Name *</label><input type="text" placeholder="e.g. Real-world EV charging profiles"></div>
                <div class="field"><label>Additional Details</label><textarea placeholder="Specify any required parameters, chemistry, or format..."></textarea></div>
                <div class="field"><label>Your Email (to notify you if found)</label><input type="email"></div>
              </div>
              <button class="primary" type="submit">Submit Request</button>
              <div id="requestMsg"></div>
            </form>
          </div>
        </div>

        <div class="tab-panel" data-panel="guide">
          <div class="card">
            <h3 style="margin-top:0;">📖 Curation Policy & Metadata Standards</h3>
            <p><strong>• Public Domain Only:</strong> Ensure the dataset you are submitting is publicly available or you hold the rights to share it.</p>
            <p><strong>• URL Validity:</strong> Provide direct links to repositories (GitHub, Mendeley, Zenodo) rather than generic homepages.</p>
            <p><strong>• Accuracy:</strong> Fill out the Chemistry and Data Type fields accurately to help researchers filter effectively.</p>
          </div>
        </div>
      `;

      bindTabs('contributeTabs');

      // 监听隐藏的 input，更新文件名显示
      document.getElementById('hiddenFileInput').addEventListener('change', function(e) {
        const display = document.getElementById('fileNameDisplay');
        if (this.files && this.files.length > 0) {
          display.textContent = this.files[0].name;
          display.style.color = 'var(--brand-dark)';
          display.style.fontWeight = 'bold';
        } else {
          display.textContent = 'No file chosen';
          display.style.color = '#64748B';
          display.style.fontWeight = 'normal';
        }
      });

      document.getElementById('uploadForm').addEventListener('submit', async e => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const msg = document.getElementById('submitMsg');
        
        // 组装要发送到 Google Sheets 的数据字典 (这里的 Key 必须和你的表格表头一字不差)
        const payload = {
          "Dataset Name": String(fd.get('new_name') || '').trim(),
          "Domain": String(fd.get('new_domain') || '').trim(),
          "Category": String(fd.get('new_category')||'').trim(),
          "Sub-category": String(fd.get('new_subcat')||'').trim(),
          "Short Description": String(fd.get('new_desc')||'').trim(),
          "Link": String(fd.get('new_link') || fd.get('uploaded_file')?.name || '').trim(),
          "Source Organization": String(fd.get('new_org')||'').trim(),
          "Author": String(fd.get('new_contributor') || '').trim(),
          "Contributor Email": String(fd.get('new_email')||'').trim(),
          "Status": "Pending" // 默认状态设为待审核
        };

        if (!payload["Dataset Name"] || !payload["Domain"] || !payload["Author"]) {
          msg.innerHTML = `<div class="error">Please fill in all required fields.</div>`;
          return;
        }

        msg.innerHTML = `<div class="info">🚀 Submitting to cloud database... Please wait.</div>`;
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;

        try {
          // 发送 POST 请求到 Google Apps Script
          const response = await fetch(API_URL, {
            method: 'POST',
            // ⚠️使用 text/plain 可以避免复杂的 CORS 跨域拦截问题
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          
          if (response.ok) {
            msg.innerHTML = `<div class="success">✅ Successfully submitted! Waiting for admin approval.</div>`;
            e.target.reset();
            document.getElementById('fileNameDisplay').textContent = 'No file chosen';
            // 提交成功后重新拉取一次最新数据
            loadDataFromGoogleSheets();
          } else {
            throw new Error('Network response was not ok');
          }
        } catch (error) {
          console.error("Submit Error:", error);
          msg.innerHTML = `<div class="error">❌ Failed to submit. Please check console.</div>`;
        } finally {
          submitBtn.disabled = false;
        }
      });

      document.getElementById('requestForm').addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('requestMsg').innerHTML = `<div class="success">Request submitted successfully! We will keep an eye out for this data.</div>`;
        e.target.reset();
      });
    }

    function renderNotifications() {
      const display = state.notifications.filter(n => {
        if (state.filterNotif === 'Unread') return n.status === 'Unread';
        if (state.filterNotif === 'All') return true;
        return n.type === state.filterNotif;
      });

      root.innerHTML = `
        ${sectionHeader('🔔 Notifications')}
        <div class="notif-toolbar" style="margin-bottom:20px;">
          <div class="notif-buttons">
            <button class="primary btn-outline" id="markRead" style="min-height:38px;">Mark all as read</button>
            <button class="primary btn-outline" id="clearRead" style="min-height:38px;">Clear read</button>
          </div>
          <div class="field">
            <select id="notifFilter"><option ${state.filterNotif==='All'?'selected':''}>All</option><option ${state.filterNotif==='Unread'?'selected':''}>Unread</option><option ${state.filterNotif==='System'?'selected':''}>System</option><option ${state.filterNotif==='Dataset'?'selected':''}>Dataset</option><option ${state.filterNotif==='Review'?'selected':''}>Review</option></select>
          </div>
          <div></div>
        </div>
        <div id="notifList">
          ${display.length ? display.map(n => {
            const bgColor = n.status === 'Read' ? '#FAFCFA' : '#FFFFFF';
            const borderColor = n.status === 'Read' ? '#E2E8F0' : '#A7F3D0'; 
            const boxShadow = n.status === 'Read' ? 'none' : '0 4px 15px rgba(58, 157, 93, 0.08)';
            return `
              <div class="notif-item" style="background:${bgColor}; border:1px solid ${borderColor}; box-shadow:${boxShadow};">
                <div class="notif-icon">${n.icon}</div>
                <div style="flex:1;">
                  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:10px; flex-wrap:wrap;">
                    <span class="notif-title">${escapeHtml(n.title)}</span>
                    <span class="notif-time">${escapeHtml(n.time)}</span>
                  </div>
                  <div class="notif-msg">${escapeHtml(n.msg)}</div>
                  <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <span class="tag-soft">${escapeHtml(n.type)}</span>
                    ${n.status === 'Unread' ? `<span class="tag-blue">Unread</span>` : ''}
                  </div>
                </div>
              </div>
            `;
          }).join('') : `<div class="info">No notifications to display.</div>`}
        </div>
      `;

      document.getElementById('notifFilter').addEventListener('change', e => { state.filterNotif = e.target.value; renderNotifications(); });
      document.getElementById('markRead').onclick = () => { state.notifications.forEach(n => n.status = 'Read'); renderNotifications(); };
      document.getElementById('clearRead').onclick = () => { state.notifications = state.notifications.filter(n => n.status !== 'Read'); renderNotifications(); };
    }

    function bindTabs(wrapperId) {
      const wrap = document.getElementById(wrapperId);
      const btns = wrap.querySelectorAll('.tab-btn');
      btns.forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          wrap.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.querySelectorAll(`.tab-panel`).forEach(p => p.classList.remove('active'));
          document.querySelector(`.tab-panel[data-panel="${tab}"]`)?.classList.add('active');
        });
      });
    }

    rerender(); // 先渲染一个没有数据的空网页外壳
    loadDataFromGoogleSheets(); // 然后去谷歌表格拉取真数据，拉到后再自动刷新一次
  </script>
